name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: focus-empire-483313-n6
  REGION: us-central1
  SERVICE: sweetscribbles

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Cloud Authentication
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authorization
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_URI="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" -t "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest" .
          docker push "$IMAGE_URI"
          docker push "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest"

      - name: Deploy Container to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
