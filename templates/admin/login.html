<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sweet Scribbles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fbf8f1; }
        .login-card { max-width: 400px; margin: 100px auto; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card p-4">
            <h3 class="text-center mb-4" style="color: #6d4c41; font-weight: bold;">Sweet Scribbles Admin</h3>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger py-2">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn w-100" style="background-color: #6d4c41; color: white; border-radius: 8px;">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('customer.home') }}" class="text-muted small text-decoration-none">← Back to Store</a>
            </div>
        </div>
    </div>
</body>
</html>
